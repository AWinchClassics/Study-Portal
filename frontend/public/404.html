<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Study Portal</title>
    <script>
      // Redirect all 404s back to index.html preserving the path
      // so React Router can handle it client-side
      const path = window.location.pathname.replace('/Study-Portal', '') || '/'
      const search = window.location.search
      const hash = window.location.hash
      sessionStorage.setItem('redirect', path + search + hash)
      window.location.replace('/Study-Portal/')
    </script>
  </head>
  <body></body>
</html>
